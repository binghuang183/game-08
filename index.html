<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>凯皇游戏</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Microsoft YaHei","PingFang SC",sans-serif;
}
body{
  min-height:100vh;
  background:#fff;
  padding:20px;
  color:#111;
}
.page-title{
  text-align:center;
  font-size:30px;
  margin:40px 0 20px;
  font-weight:bold;
  background:linear-gradient(90deg,#0066ff,#00a0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.service-btn{
  display:block;
  margin:0 auto 40px;
  padding:14px 30px;
  background:linear-gradient(90deg,#1a6dff,#004eff);
  color:#fff;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}
.container{
  max-width:520px;
  margin:0 auto;
}
.game-card{
  background:#fff;
  border-radius:16px;
  padding:26px;
  margin-bottom:24px;
  border:2px solid rgba(0,140,255,0.15);
  position:relative;
  overflow:hidden;
  transition:all 0.3s ease;
  box-shadow:0 4px 20px rgba(0,100,255,0.08);
}
.game-card::before{
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:3px;
  background:linear-gradient(90deg,#00a0ff,transparent,#00a0ff);
  background-size:200% 100%;
  animation:currentLine 3s linear infinite;
}
@keyframes currentLine{
  0%{background-position:0 0;}
  100%{background-position:200% 0;}
}
.game-price{
  background:#fff1f0;
  color:#c72828;
  padding:10px 15px;
  border-radius:8px;
  margin-bottom:18px;
  font-size:15px;
  font-weight:bold;
  text-align:center;
}
.game-info{
  background:#f7f9ff;
  padding:12px 15px;
  border-radius:8px;
  margin-top:18px;
  font-size:14px;
  color:#333;
  line-height:1.5;
  border-left:3px solid #1a6dff;
}
.game-name{
  text-align:center;
  font-size:21px;
  font-weight:bold;
  margin-bottom:12px;
  color:#111;
}
.btn-row{
  display:flex;
  gap:10px;
  margin-bottom:14px;
  align-items:center;
}
.btn-download{
  flex:1;
  padding:15px;
  border-radius:10px;
  border:none;
  font-size:15px;
  font-weight:bold;
  color:#fff;
  cursor:pointer;
  background:linear-gradient(90deg,#1a6dff,#004eff);
}
.btn-download.ios{
  background:linear-gradient(90deg,#5a39ff,#7c4dff);
}
.btn-download.admin{
  background:linear-gradient(90deg,#2b58ff,#417dff);
}
.btn-download.img{
  background:linear-gradient(90deg,#00c896,#00a878);
}
/* 超级签按钮 */
.btn-download.supersign{
  background:linear-gradient(90deg, #ff4d94, #ff3366);
}
/* 超级签购买按钮 */
.btn-download.buy{
  background:linear-gradient(90deg, #ff6b35, #ff451a);
}
.btn-copy{
  width:68px;
  padding:15px 0;
  border-radius:10px;
  border:1px solid #e0e0e0;
  background:#f7f9ff;
  color:#1a6dff;
  font-size:14px;
  cursor:pointer;
}
.img-modal{
  position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);
  display:flex;align-items:center;justify-content:center;z-index:9999;
  padding:20px;display:none;
}
.img-modal img{
  max-width:100%;max-height:90vh;border-radius:10px;
}
.img-modal.show{display:flex;}
</style>
</head>

<body>
<h1 class="page-title">凯皇游戏</h1>
<button class="service-btn" onclick="copyWechat()">复制微信|客服开通后台</button>

<div class="container" id="gameList"></div>

<div class="img-modal" id="imgModal" onclick="closeImg()">
  <img src="" id="bigImg">
</div>

<script>
const wechatId = "18719246460";

const games = [
  {
    name: "斗罗大陆6SSP",
    price: "售价：200元",
    android: "http://123.207.28.103/index.php?id=xindouluodalu6ssp",
    android2: "#",
    ios: "#",
    ios2: "",
    superSign: "#",
    superBuy: "#", // 购买按钮，不显示
    admin: "http://106.55.188.65:520/",
    info: "最新版本更新：6ssp魂师+4SSP暗器+SSP魂灵+SSP神器+SSP魂骨各种该有的都有全部PVP模式修复正常，上一版已知问题全修复",
    img: "https://cdn.phototourl.com/free/2026-04-16-495df581-a36c-41b0-ba3b-55ddbf540658.png",
  },
  {
    name: "枫叶岛冒险岛H5（内购+后台）",
    price: "售价：388元无限内购 | 588元物品后台",
    android: "http://109.244.35.46:82/index/user/login.html",
    android2: "http://123.207.28.103/index.php?id=fengyedao",
    ios: "http://123.207.28.103/index.php?id=fengyedaoios",
    ios2: "",
    superSign: "https://chaojiqian.com",
    superBuy: "https://chaojiqian-buy.com", // 填写就显示购买按钮
    admin: "http://109.244.35.46:88/",
    info: "不要发太多经验，不然转不了职，就得重新买卡密了",
    img: "https://cdn.phototourl.com/free/2026-04-16-fc115083-adf2-4857-88c1-efe2c7351c2f.png",
  }
    {
    name: "九州江湖情（内购+后台）",
    price: "售价：488元无限内购 | 688元物品后台",
    android: "http://123.207.28.103/index.php?id=jiuzhoujianghuqing",
    android2: "",
    ios: "",
    ios2: "",
    superSign: "https://hetaobao.cn/vip/1wsz",
    superBuy: "https://www.kuaifaka.net/purchasing?link=fQG9m", // 填写就显示购买按钮
    admin: "http://106.53.135.185/ht/player/",
    info: "最新版本",
    img: "https://cdn.phototourl.com/free/2026-04-16-8f5cb4bd-f2fb-4235-a2ee-6087e2efd525.png",
  }
];

// 复制微信
function copyWechat(){
  navigator.clipboard.writeText(wechatId).then(()=>{
    alert("微信客服复制成功！");
  }).catch(()=>{
    alert("复制失败，请手动复制："+wechatId);
  })
}

// 复制链接
function copyLink(text){
  navigator.clipboard.writeText(text).then(()=>{
    alert("链接复制成功！");
  }).catch(()=>{
    alert("复制失败，请手动复制："+text);
  })
}

// 图片预览
function openImg(src){
  const m = document.getElementById('imgModal');
  const i = document.getElementById('bigImg');
  i.src = src;
  m.classList.add('show');
}
function closeImg(){
  document.getElementById('imgModal').classList.remove('show');
}

// 渲染
const container = document.getElementById('gameList');
games.forEach(g=>{
  const card = document.createElement('div');
  card.className = 'game-card';
  let html = '';

  // 1. 游戏名称
  html += `<div class="game-name">${g.name}</div>`;

  // 2. 价格
  if(g.price){
    html += `<div class="game-price">${g.price}</div>`;
  }

  // 3. 安卓1
  html += `
  <div class="btn-row">
    <button class="btn-download android" onclick="window.open('${g.android}','_blank')">安卓下载</button>
    <button class="btn-copy" onclick="copyLink('${g.android}')">复制</button>
  </div>`;

  // 安卓2
  if(g.android2 && g.android2 !== '#'){
    html += `
    <div class="btn-row">
      <button class="btn-download android" onclick="window.open('${g.android2}','_blank')">安卓下载2</button>
      <button class="btn-copy" onclick="copyLink('${g.android2}')">复制</button>
    </div>`;
  }

  // 苹果1
  if(g.ios && g.ios !== '#'){
    html += `
    <div class="btn-row">
      <button class="btn-download ios" onclick="window.open('${g.ios}','_blank')">苹果下载</button>
      <button class="btn-copy" onclick="copyLink('${g.ios}')">复制</button>
    </div>`;
  }

  // 苹果2
  if(g.ios2 && g.ios2 !== '#'){
    html += `
    <div class="btn-row">
      <button class="btn-download ios" onclick="window.open('${g.ios2}','_blank')">苹果下载2</button>
      <button class="btn-copy" onclick="copyLink('${g.ios2}')">复制</button>
    </div>`;
  }

  // 苹果超级签
  if(g.superSign && g.superSign !== '#'){
    html += `
    <div class="btn-row">
      <button class="btn-download supersign" onclick="window.open('${g.superSign}','_blank')">苹果超级签</button>
      <button class="btn-copy" onclick="copyLink('${g.superSign}')">复制</button>
    </div>`;
  }

  // 苹果超级签购买 👈 新加按钮
  if(g.superBuy && g.superBuy !== '#'){
    html += `
    <div class="btn-row">
      <button class="btn-download buy" onclick="window.open('${g.superBuy}','_blank')">超级签购买</button>
      <button class="btn-copy" onclick="copyLink('${g.superBuy}')">复制</button>
    </div>`;
  }

  // 后台
  html += `
  <div class="btn-row">
    <button class="btn-download admin" onclick="window.open('${g.admin}','_blank')">后台地址</button>
    <button class="btn-copy" onclick="copyLink('${g.admin}')">复制</button>
  </div>`;

  // 游戏截图
  if(g.img){
    html += `
    <div class="btn-row">
      <button class="btn-download img" onclick="openImg('${g.img}')">游戏截图</button>
    </div>`;
  }

  // 版本说明
  if(g.info){
    html += `<div class="game-info">${g.info}</div>`;
  }

  card.innerHTML = html;
  container.appendChild(card);
})
</script>
</body>
</html>
