body{
  min-height:100vh;
  background:#fff;
  padding:20px;
  color:#111;
}
.page-title{
  text-align:center;
  font-size:30px;
  margin:40px 0 20px;
  font-weight:bold;
  background:linear-gradient(90deg,#0066ff,#00a0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.service-btn{
  display:block;
  margin:0 auto 40px;
  padding:14px 30px;
  background:linear-gradient(90deg,#1a6dff,#004eff);
  color:#fff;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}
.container{
  max-width:520px;
  margin:0 auto;
}
.game-card{
  background:#fff;
  border-radius:16px;
  padding:26px;
  margin-bottom:24px;
  border:2px solid rgba(0,140,255,0.15);
  position:relative;
  overflow:hidden;
  transition:all 0.3s ease;
  box-shadow:0 4px 20px rgba(0,100,255,0.08);
}
.game-card::before{
  content:'';
  position:absolute;
  top:0; left:0; right:0;
  height:3px;
  background:linear-gradient(90deg,#00a0ff,transparent,#00a0ff);
  background-size:200% 100%;
  animation:currentLine 3s linear infinite;
}
@keyframes currentLine{
  0%{background-position:0 0;}
  100%{background-position:200% 0;}
}
.game-price{
  background:#fff1f0;
  color:#c72828;
  padding:10px 15px;
  border-radius:8px;
  margin-bottom:18px;
  font-size:15px;
  font-weight:bold;
  text-align:center;
}
.game-info{
  background:#f7f9ff;
  padding:12px 15px;
  border-radius:8px;
  margin-top:18px;
  font-size:14px;
  color:#333;
  line-height:1.5;
  border-left:3px solid #1a6dff;
}
.game-name{
  text-align:center;
  font-size:21px;
  font-weight:bold;
  margin-bottom:12px;
  color:#111;
}
.btn-row{
  display:flex;
  gap:10px;
  margin-bottom:14px;
  align-items:center;
}
.btn-download{
  flex:1;
  padding:15px;
  border-radius:10px;
  border:none;
  font-size:15px;
  font-weight:bold;
  color:#fff;
  cursor:pointer;
  background:linear-gradient(90deg,#1a6dff,#004eff);
}
.btn-download.ios{
  background:linear-gradient(90deg,#5a39ff,#7c4dff);
}
.btn-download.admin{
  background:linear-gradient(90deg,#2b58ff,#417dff);
}
.btn-download.img{
  background:linear-gradient(90deg,#00c896,#00a878);
}
.btn-download.supersign{
  background:linear-gradient(90deg, #ff4d94, #ff3366);
}
.btn-download.buy{
  background:linear-gradient(90deg, #ff6b35, #ff451a);
}
.btn-download.active{
  background:linear-gradient(90deg, #ffcc00, #ff9900);
}
.btn-download.register{
  background:linear-gradient(90deg, #00c896, #00a878);
}
.btn-download.pc{
  background:linear-gradient(90deg, #6a11cb, #2575fc);
}
/* 网页畅玩按钮 */
.btn-download.web{
  background:linear-gradient(90deg, #17a2b8, #20c997);
}
.btn-copy{
  width:68px;
  padding:15px 0;
  border-radius:10px;
  border:1px solid #e0e0e0;
  background:#f7f9ff;
  color:#1a6dff;
  font-size:14px;
  cursor:pointer;
}
.img-modal{
  position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);

  padding:20px;display:none;
}
.img-modal img{
  max-width:100%;max-height:90vh;border-radius:10px;
}
.img-modal.show{display:flex;}
</style>
</head>

function copyLink(text){
  navigator.clipboard.writeText(text).then(()=>{
    alert("链接复制成功！");
  }).catch(()=>{
    alert("复制失败，请手动复制："+text);
  })
}

// 图片预览
function openImg(src){
  const m = document.getElementById('imgModal');
  const i = document.getElementById('bigImg');
  i.src = src;
  m.classList.add('show');
}
function closeImg(){
  document.getElementById('imgModal').classList.remove('show');
}
